name: EAS Build (Android Preview)

on:
  pull_request:
    branches: [master]
    paths:
      - 'app/**'
      - '.github/workflows/eas-build.yml'
  workflow_dispatch:

jobs:
  build:
    name: EAS Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (preview)
        working-directory: app
        id: eas-build
        run: |
          BUILD_OUTPUT=$(eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json 2>/dev/null)
          echo "build_output=$BUILD_OUTPUT" >> $GITHUB_OUTPUT
          BUILD_URL=$(echo "$BUILD_OUTPUT" | jq -r '.[0].buildDetailsPageUrl // empty')
          ARTIFACT_URL=$(echo "$BUILD_OUTPUT" | jq -r '.[0].artifacts.buildUrl // empty')
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT
          echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
          echo "Build URL: $BUILD_URL"
          echo "Artifact URL: $ARTIFACT_URL"

      - name: Wait for build and get artifact URL
        id: wait-build
        working-directory: app
        run: |
          # ビルドが非同期の場合はポーリングして完了を待つ
          for i in $(seq 1 30); do
            STATUS=$(eas build:list \
              --platform android \
              --limit 1 \
              --json 2>/dev/null | jq -r '.[0].status // empty')
            ARTIFACT_URL=$(eas build:list \
              --platform android \
              --limit 1 \
              --json 2>/dev/null | jq -r '.[0].artifacts.buildUrl // empty')
            echo "Status: $STATUS, Attempt: $i/30"
            if [ "$STATUS" = "FINISHED" ] && [ -n "$ARTIFACT_URL" ]; then
              echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
              break
            fi
            if [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 60
          done
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Generate QR code and comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const artifactUrl = '${{ steps.wait-build.outputs.artifact_url }}';
            const buildUrl = '${{ steps.eas-build.outputs.build_url }}';

            if (!artifactUrl) {
              console.log('No artifact URL found, skipping QR comment');
              return;
            }

            // QRコード画像URL (shields.io経由で生成)
            const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(artifactUrl)}`;

            const body = [
              '## 📱 Android APK ビルド完了',
              '',
              'QRコードをスキャンしてAPKをインストールできます。',
              '',
              `![QR Code](${qrImageUrl})`,
              '',
              `**直接ダウンロード:** [APKをダウンロード](${artifactUrl})`,
              buildUrl ? `**ビルド詳細:** [EAS Build](${buildUrl})` : '',
              '',
              '> ⚠️ インストール前にAndroid設定で「不明なソースからのインストール」を有効にしてください。',
            ].filter(Boolean).join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
