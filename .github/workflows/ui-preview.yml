name: UI Preview (Screenshot)

on:
  push:
    branches: [main, master]
    paths:
      - 'app/src/**'
      - 'app/App.tsx'
      - 'app/index.web.js'
  pull_request:
    paths:
      - 'app/src/**'
      - 'app/App.tsx'
      - 'app/index.web.js'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: app/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build web app
        run: npx expo export --platform web
        env:
          NODE_ENV: production

      - name: Serve web build & take screenshots
        run: |
          npx serve web-build -l 4000 &
          sleep 3
          npx playwright test e2e/screenshot.spec.ts --reporter=list

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-screenshots
          path: app/e2e/screenshots/
          retention-days: 30
