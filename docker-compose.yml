version: '3.8'

services:
  convert2gabigabi:
    build: .
    container_name: convert2gabigabi-dev
    ports:
      - "8081:8081"  # Metro server
      - "3000:3000"  # Web development server
    volumes:
      - .:/workspace
      - node_modules:/workspace/app/node_modules
      - rust_target:/workspace/rust_core/target
    environment:
      - NODE_ENV=development
    command: bash -c "cd app && yarn expo"
    stdin_open: true
    tty: true

  # Web版でのUIテスト用
  web-dev:
    build: .
    container_name: convert2gabigabi-web
    ports:
      - "3001:3000"
    volumes:
      - .:/workspace
      - node_modules:/workspace/app/node_modules
    environment:
      - NODE_ENV=development
    command: bash -c "cd app && npx expo start --web"
    depends_on:
      - convert2gabigabi

volumes:
  node_modules:
  rust_target: 